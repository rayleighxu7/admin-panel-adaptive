{% extends "layout.html" %}

{% block header %}
    <div class="row align-items-center">
        <div class="col-auto">
            <h2 class="page-title">
                <i class="fa fa-database me-2"></i>Database Schema
            </h2>
            <div class="text-muted mt-1" id="schema-summary">Loading&hellip;</div>
        </div>
    </div>
{% endblock %}

{% block content %}
<div class="col-12 dev-db flex-column" id="schema-container">
    <div class="text-center py-5 text-muted" id="schema-loading">
        <i class="fa fa-spinner fa-spin fa-2x"></i>
        <div class="mt-2">Loading schema&hellip;</div>
    </div>
</div>

{% endblock %}

{% block script %}
<script>
(function() {
    const container = document.getElementById('schema-container');
    const summary = document.getElementById('schema-summary');

    fetch('/api/schema')
        .then(r => r.json())
        .then(data => {
            summary.textContent = `${data.total_tables} tables`;
            document.getElementById('schema-loading').remove();
            data.tables.forEach(renderTable);
        })
        .catch(err => {
            container.innerHTML = `<div class="alert alert-danger">Failed to load schema: ${err.message}</div>`;
        });

    function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function renderTable(table) {
        const hasIndexes = table.indexes && table.indexes.length > 0;
        const card = document.createElement('div');
        card.className = 'card mb-4';
        card.id = `table-${table.name}`;

        const indexBadge = hasIndexes
            ? `<span class="badge bg-cyan-lt me-1">${table.indexes.length} index${table.indexes.length !== 1 ? 'es' : ''}</span>`
            : '';

        const indexSection = hasIndexes ? `
            <div class="mt-3">
                <h4 class="mb-2">
                    <i class="fa fa-bolt me-1"></i>Indexes
                </h4>
                <div class="table-responsive">
                    <table class="table table-vcenter table-bordered table-sm mb-0">
                        <thead><tr><th>Index Name</th><th>Columns</th><th class="text-center">Unique</th></tr></thead>
                        <tbody>
                            ${table.indexes.map(idx => `<tr>
                                <td><code>${esc(idx.name || '')}</code></td>
                                <td>${idx.column_names.map(c => `<span class="badge bg-secondary me-1">${esc(c)}</span>`).join('')}</td>
                                <td class="text-center">${idx.unique ? '<span class="badge bg-green-lt">UNIQUE</span>' : '<span class="text-muted">No</span>'}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            </div>` : '';

        card.innerHTML = `
            <div class="card-header">
                <h3 class="card-title">
                    <i class="fa fa-table me-2 text-primary"></i>
                    <span class="admin-inline-code">${esc(table.name)}</span>
                </h3>
                <div class="card-actions">
                    <a class="btn btn-sm btn-outline-secondary me-1"
                       href="/api/schema/export.csv?table_name=${encodeURIComponent(table.name)}"
                       data-export-btn="1">
                        <i class="fa fa-file-csv me-1"></i>Export to CSV
                    </a>
                    <span class="badge bg-blue-lt me-1">${table.row_count} row${table.row_count !== 1 ? 's' : ''}</span>
                    <span class="badge bg-purple-lt me-1">${table.columns.length} col${table.columns.length !== 1 ? 's' : ''}</span>
                    ${indexBadge}
                </div>
            </div>
            <div class="card-body p-0">
                <div class="p-3">
                    <div class="table-responsive">
                        <table class="table table-vcenter table-bordered table-sm mb-0">
                            <thead>
                                <tr>
                                    <th class="admin-col-30">Column</th>
                                    <th class="admin-col-20">Type</th>
                                    <th class="admin-col-10 text-center">Nullable</th>
                                    <th class="admin-col-15">Default</th>
                                    <th class="admin-col-25">Constraints</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${table.columns.map(col => `<tr>
                                    <td><code>${esc(col.name)}</code></td>
                                    <td><span class="badge bg-cyan-lt admin-inline-code">${esc(col.type)}</span></td>
                                    <td class="text-center">${col.nullable ? '<span class="text-muted">YES</span>' : '<span class="text-danger fw-bold">NO</span>'}</td>
                                    <td>${col.default ? `<code class="text-muted">${esc(col.default)}</code>` : '<span class="text-muted">&mdash;</span>'}</td>
                                    <td>
                                        ${col.is_pk ? '<span class="badge bg-yellow-lt me-1"><i class="fa fa-key me-1"></i>PK</span>' : ''}
                                        ${col.fk_ref ? `<span class="badge bg-green-lt"><i class="fa fa-link me-1"></i>FK &rarr; ${esc(col.fk_ref)}</span>` : ''}
                                    </td>
                                </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                    ${indexSection}
                </div>
            </div>`;

        const exportBtn = card.querySelector('[data-export-btn="1"]');
        if (exportBtn) {
            exportBtn.addEventListener('click', function(event) {
                event.stopPropagation();
            });
        }

        enableResizableTables(card);
        container.appendChild(card);
    }

    function enableResizableTables(rootEl) {
        rootEl.querySelectorAll('table').forEach(makeTableResizable);
    }

    function makeTableResizable(table) {
        if (!table.tHead || table.dataset.resizableBound === '1') return;
        table.classList.add('resizable-table');
        table.dataset.resizableBound = '1';

        const headCells = Array.from(table.tHead.querySelectorAll('th'));
        if (headCells.length < 2) return;

        function updateTableWidth() {
            const total = headCells.reduce((sum, cell) => sum + cell.getBoundingClientRect().width, 0);
            table.style.width = `${Math.round(total)}px`;
            table.style.minWidth = '100%';
        }

        headCells.forEach((th, idx) => {
            const currentWidth = th.getBoundingClientRect().width;
            th.style.width = `${Math.max(80, Math.round(currentWidth))}px`;
            th.style.minWidth = '80px';
            if (idx === headCells.length - 1) return;

            const handle = document.createElement('span');
            handle.className = 'resize-handle';
            handle.setAttribute('aria-hidden', 'true');
            th.appendChild(handle);

            handle.addEventListener('mousedown', function onMouseDown(event) {
                event.preventDefault();
                event.stopPropagation();

                const startX = event.clientX;
                const startWidth = th.getBoundingClientRect().width;
                th.classList.add('is-resizing');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';

                function onMove(moveEvent) {
                    const delta = moveEvent.clientX - startX;
                    const next = Math.max(80, startWidth + delta);
                    th.style.width = `${Math.round(next)}px`;
                    updateTableWidth();
                }

                function onUp() {
                    th.classList.remove('is-resizing');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                }

                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onUp);
            });
        });

        updateTableWidth();
    }
})();
</script>
{% endblock %}
