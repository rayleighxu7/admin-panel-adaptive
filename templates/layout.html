<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Admin Panel{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.3/air-datepicker.min.css">
    <link rel="stylesheet" href="/brand.css">
    <link rel="stylesheet" href="/static/custom.css">
    {% block head_css %}{% endblock %}
</head>
<body class="layout-fluid app-shell">
    <div class="page">
        <aside class="navbar navbar-vertical navbar-expand-lg" data-bs-theme="dark">
            <div class="container-fluid">
                <button class="navbar-toggler" type="button"
                        data-bs-toggle="collapse" data-bs-target="#sidebar-menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="navbar-brand navbar-brand-autodark py-3">
                    <a href="/" class="d-flex align-items-center text-decoration-none">
                        <span class="sidebar-brand-icon me-2">
                            <i class="fa fa-cube fa-lg"></i>
                        </span>
                        <span class="sidebar-brand-text fw-bold">
                            Admin Panel
                        </span>
                    </a>
                </div>
                <div class="collapse navbar-collapse" id="sidebar-menu">
                    <ul class="navbar-nav pt-lg-2">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#sidebar-management"
                               data-bs-toggle="collapse" data-bs-auto-close="false"
                               role="button" aria-expanded="true">
                                <span class="nav-link-icon"><i class="fa fa-briefcase"></i></span>
                                <span class="nav-link-title">Management</span>
                            </a>
                            <div class="dropdown-menu collapse show" id="sidebar-management">
                                <a class="dropdown-item" href="/customers">
                                    <i class="fa fa-users me-2"></i>Customers
                                </a>
                                <a class="dropdown-item" href="/preset-configs">
                                    <i class="fa fa-sliders me-2"></i>Preset Configs
                                </a>
                                <a class="dropdown-item" href="/config-matrix">
                                    <i class="fa fa-link me-2"></i>Config Matrix
                                </a>
                            </div>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#sidebar-reference"
                               data-bs-toggle="collapse" data-bs-auto-close="false"
                               role="button" aria-expanded="false">
                                <span class="nav-link-icon"><i class="fa fa-book"></i></span>
                                <span class="nav-link-title">Reference</span>
                            </a>
                            <div class="dropdown-menu collapse" id="sidebar-reference">
                                <a class="dropdown-item" href="/schema">
                                    <i class="fa fa-database me-2"></i>DB Schema
                                </a>
                                <a class="dropdown-item" href="/docs" target="_blank">
                                    <i class="fa fa-code me-2"></i>API Docs
                                </a>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </aside>
        <div class="page-wrapper">
            <div class="container-fluid">
                <div class="page-header d-print-none">
                    {% block header %}{% endblock %}
                </div>
            </div>
            <div class="page-body flex-grow-1">
                <div class="container-fluid">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/js/tabler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/air-datepicker@3.5.3/air-datepicker.min.js"></script>
    <script>
    (function() {
        document.querySelectorAll('#sidebar-menu .dropdown-menu[id]').forEach(function(menu) {
            var saved = localStorage.getItem('sidebar-' + menu.id);
            if (saved === 'open') {
                menu.classList.add('show');
                var toggle = document.querySelector('[href="#' + menu.id + '"]');
                if (toggle) toggle.setAttribute('aria-expanded', 'true');
            }
            menu.addEventListener('shown.bs.collapse', function() {
                localStorage.setItem('sidebar-' + menu.id, 'open');
            });
            menu.addEventListener('hidden.bs.collapse', function() {
                localStorage.setItem('sidebar-' + menu.id, 'closed');
            });
        });

        var currentPath = window.location.pathname;
        var links = Array.from(document.querySelectorAll('#sidebar-menu .dropdown-item[href^="/"]'));
        var activeLink = null;
        var longestMatch = 0;

        links.forEach(function(link) {
            var href = link.getAttribute('href');
            if (!href) return;
            if (href === '/') return;

            var isMatch = currentPath === href || currentPath.startsWith(href + '/');
            if (isMatch && href.length > longestMatch) {
                activeLink = link;
                longestMatch = href.length;
            }
        });

        if (activeLink) {
            activeLink.classList.add('active');
            var parentMenu = activeLink.closest('.dropdown-menu.collapse');
            if (parentMenu && !parentMenu.classList.contains('show')) {
                parentMenu.classList.add('show');
            }
            if (parentMenu) {
                var toggle = document.querySelector('[href="#' + parentMenu.id + '"]');
                if (toggle) toggle.setAttribute('aria-expanded', 'true');
            }
        }
    })();
    </script>
    <script>
    window.AdminSearchableFilter = (function() {
        function filteredOptions(options, query) {
            var q = String(query || "").trim().toLowerCase();
            if (!q) return options;
            return options.filter(function(o) {
                return (
                    String(o.label).toLowerCase().includes(q) ||
                    String(o.subtext || "").toLowerCase().includes(q)
                );
            });
        }

        function renderSearchableMenu(menuEl, options, keyName, escFn) {
            if (!options.length) {
                menuEl.innerHTML = '<div class="searchable-filter-empty">No matches</div>';
                menuEl.dataset.options = "[]";
                return;
            }

            var safeEsc = escFn || function(v) { return String(v ?? ""); };
            menuEl.dataset.options = JSON.stringify(
                options.map(function(o) {
                    return { key: o[keyName], label: o.label, subtext: o.subtext || "" };
                })
            );
            menuEl.innerHTML = options
                .map(function(o, idx) {
                    return (
                        '<button type="button" class="searchable-filter-option" data-index="' + idx + '">' +
                            '<span class="searchable-filter-option-main">' + safeEsc(o.label) + '</span>' +
                            (o.subtext ? ('<span class="searchable-filter-option-sub">' + safeEsc(o.subtext) + '</span>') : "") +
                        "</button>"
                    );
                })
                .join("");
        }

        function bindSearchableFilter(inputEl, menuEl, getOptions, keyName, onPick, onClear, escFn, behavior) {
            var wrapperEl = inputEl.closest(".searchable-filter");
            var opts = behavior || {};

            function closeAllSearchableMenus() {
                document.querySelectorAll(".searchable-filter-menu").forEach(function(menu) {
                    if (menu !== menuEl) menu.classList.add("d-none");
                });
                document.querySelectorAll(".searchable-filter.is-open").forEach(function(el) {
                    if (el !== wrapperEl) el.classList.remove("is-open");
                });
            }

            function openMenu() {
                closeAllSearchableMenus();
                menuEl.classList.remove("d-none");
                if (wrapperEl) wrapperEl.classList.add("is-open");
            }

            function closeMenu() {
                menuEl.classList.add("d-none");
                if (wrapperEl) wrapperEl.classList.remove("is-open");
            }

            function refreshMenu(forceAll) {
                var query = forceAll ? "" : inputEl.value;
                var options = filteredOptions(getOptions(), query);
                renderSearchableMenu(menuEl, options, keyName, escFn);
                openMenu();
                return options;
            }

            inputEl.addEventListener("focus", function() {
                refreshMenu(true);
            });
            inputEl.addEventListener("click", function() {
                refreshMenu(true);
            });
            inputEl.addEventListener("input", function() {
                if (!inputEl.value.trim()) {
                    onClear();
                    if (typeof opts.onEmptyInput === "function") opts.onEmptyInput();
                }
                refreshMenu(false);
            });
            inputEl.addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    var options = filteredOptions(getOptions(), inputEl.value);
                    if (options.length > 0) {
                        var first = options[0];
                        onPick({
                            key: first[keyName],
                            label: first.label,
                            subtext: first.subtext || ""
                        });
                    } else {
                        onClear();
                        inputEl.value = "";
                        if (typeof opts.onNoMatchEnter === "function") opts.onNoMatchEnter();
                    }
                    closeMenu();
                } else if (event.key === "Escape") {
                    closeMenu();
                }
            });
            inputEl.addEventListener("blur", function() {
                setTimeout(closeMenu, 120);
            });
            menuEl.addEventListener("mousedown", function(event) {
                event.preventDefault();
            });
            menuEl.addEventListener("click", function(event) {
                var button = event.target.closest(".searchable-filter-option");
                if (!button) return;
                var options = JSON.parse(menuEl.dataset.options || "[]");
                var pick = options[Number(button.dataset.index)];
                if (!pick) return;
                onPick(pick);
                closeMenu();
            });
        }

        return {
            filteredOptions: filteredOptions,
            renderSearchableMenu: renderSearchableMenu,
            bindSearchableFilter: bindSearchableFilter
        };
    })();
    </script>
    <script>
    window.AdminDatePicker = (function() {
        var EN_LOCALE = {
            days: ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'],
            daysShort: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
            daysMin: ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'],
            months: ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'],
            monthsShort: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
            today: 'Today',
            clear: 'Clear',
            dateFormat: 'yyyy-MM-dd',
            timeFormat: 'hh:mm aa',
            firstDay: 0
        };

        function init(root) {
            if (typeof AirDatepicker === 'undefined') return;
            var scope = root || document;
            var inputs = scope.querySelectorAll('input[type="date"], input[data-date-picker="true"]');
            inputs.forEach(function(input) {
                if (input.dataset.fpBound === '1') return;
                var initialValue = input.value || null;
                input.type = 'text';
                input.placeholder = input.placeholder || 'YYYY-MM-DD';
                var picker = new AirDatepicker(input, {
                    autoClose: true,
                    locale: EN_LOCALE,
                    dateFormat: 'yyyy-MM-dd',
                    isMobile: false,
                    selectedDates: initialValue ? [initialValue] : [],
                    onSelect: function(args) {
                        input.value = args.formattedDate || '';
                        input.dispatchEvent(new Event('input', { bubbles: true }));
                        input.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                });
                input._adminDatePicker = picker;
                input.dataset.fpBound = '1';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            init(document);
        });

        return { init: init };
    })();
    </script>
    {% block script %}{% endblock %}
</body>
</html>
